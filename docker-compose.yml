services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realestatevision-api
    ports:
      - "8000:8000"
    environment:
      DEFAULT_MODEL: mobilenet_v3_small
      DEFAULT_VERSION_TAG: cleaned_v1
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./api:/app/api
      - ./db:/app/db
      - ./models:/app/models
      - ./data://app/data
      - ./mlruns:/app/mlruns
    depends_on:
      - mlflow
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  mlflow:
    image: python:3.10-slim
    container_name: realestatevision-mlflow
    working_dir: /mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: sh -c "pip install --no-cache-dir mlflow==3.12.0 && mlflow server --backend-store-uri /mlflow/mlruns --default-artifact-root /mlflow/mlruns --host 0.0.0.0 --port 5000 --allowed-hosts 'mlflow:5000,localhost:5001,localhost:*'"
    restart: unless-stopped





